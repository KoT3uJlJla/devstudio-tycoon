<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0b1020" />
    <meta name="referrer" content="no-referrer" />
    <title>DevStudio Tycoon — 404</title>
    <style>
      :root { color-scheme: dark; --ink:#05060d; --text:#fffaf2; --muted:#cfd6ff; --cyan:#1df7ff; --pink:#ff3bbd; --yellow:#ffe04e; }
      * { box-sizing: border-box; }
      body { margin: 0; min-height: 100vh; display: grid; place-items: center; padding: 18px; color: var(--text); background: radial-gradient(circle at 12% 8%, rgba(255,59,189,.32), transparent 24%), radial-gradient(circle at 86% 6%, rgba(29,247,255,.28), transparent 22%), linear-gradient(145deg, #05060d, #151342 55%, #05060d); font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      section { width: min(100%, 430px); border: 3px solid var(--ink); border-radius: 26px; padding: 22px; background: rgba(15,18,42,.94); box-shadow: 8px 8px 0 #02030a, 11px 11px 0 rgba(255,59,189,.55); }
      p:first-child { margin: 0 0 8px; color: var(--cyan); font-size: 11px; font-weight: 900; letter-spacing: .14em; text-transform: uppercase; }
      h1 { margin: 0; font-size: clamp(34px, 12vw, 58px); line-height: .9; letter-spacing: -.055em; text-transform: uppercase; }
      p { color: var(--muted); line-height: 1.45; font-weight: 650; }
      .button { display: inline-flex; align-items: center; justify-content: center; min-height: 44px; border: 3px solid var(--ink); border-radius: 18px; padding: 12px 16px; color: var(--ink); background: linear-gradient(135deg, var(--yellow), var(--pink)); box-shadow: 5px 5px 0 var(--cyan); font-weight: 900; text-decoration: none; }
    </style>
  </head>
  <body>
    <section>
      <p>DevStudio Tycoon</p>
      <h1>404</h1>
      <p>Такой страницы нет или приложение не смогло получить свежий shell. Вернись на главный экран студии.</p>
      <a class="button" href="/">Открыть студию</a>
    </section>
  </body>
</html>
